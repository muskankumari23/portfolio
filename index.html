<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Muskan Kumari | Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  </head>
  <body class="bg-slate-900 text-slate-100 font-sans antialiased overflow-x-hidden selection:bg-teal-500/30">
    <!-- Custom Cursor elements -->
    <div class="custom-cursor bg-transparent border-2 border-teal-400 w-5 h-5 rounded-full fixed pointer-events-none z-[9999] -translate-x-1/2 -translate-y-1/2 transition-transform duration-100 mix-blend-difference hidden md:block"></div>
    <div class="custom-cursor-dot bg-sky-400 w-1.5 h-1.5 rounded-full fixed pointer-events-none z-[9999] -translate-x-1/2 -translate-y-1/2 hidden md:block"></div>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <script>
      // Custom cursor logic
      const cursor = document.querySelector('.custom-cursor');
      const cursorDot = document.querySelector('.custom-cursor-dot');
      
      if(window.innerWidth >= 768) {
        document.addEventListener('mousemove', (e) => {
          requestAnimationFrame(() => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
            cursorDot.style.left = e.clientX + 'px';
            cursorDot.style.top = e.clientY + 'px';
          });
        });

        document.addEventListener('mousedown', () => {
          cursor.style.transform = 'translate(-50%, -50%) scale(0.8)';
        });

        document.addEventListener('mouseup', () => {
          cursor.style.transform = 'translate(-50%, -50%) scale(1)';
        });

        const interactables = document.querySelectorAll('a, button, input, textarea');
        interactables.forEach(el => {
          el.addEventListener('mouseenter', () => {
            cursor.style.transform = 'translate(-50%, -50%) scale(1.5)';
            cursor.style.borderColor = '#0ea5e9'; // sky-500
          });
          el.addEventListener('mouseleave', () => {
            cursor.style.transform = 'translate(-50%, -50%) scale(1)';
            cursor.style.borderColor = '#14b8a6'; // teal-400
          });
        });
      }
    </script>
  </body>
</html>
